[pytest]
DJANGO_SETTINGS_MODULE = radiostats.settings.dev
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --disable-warnings
testpaths = tests
markers =
    django_db: mark test as requiring database
    slow: mark test as slow
norecursedirs = .git .tox dist build *.egg
